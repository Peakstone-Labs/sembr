<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>sembr dashboard — login</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/dashboard/style.css">
</head>
<body>

<header>
  <h1>sembr</h1>
</header>

<div class="login-wrap">
  <div class="login-card" id="login-panel">
    <h2>access token</h2>
    <p class="muted" id="hint" style="display:none; margin-bottom:16px; font-size:0.85rem; line-height:1.6;">
      Enter the value of <code style="font-family:var(--font-mono); background:var(--bg-secondary); padding:1px 6px; border-radius:3px;">DASHBOARD_TOKEN</code>
      from the server environment to continue.
    </p>
    <p class="muted" id="hint-public" style="display:none; margin-bottom:16px; font-size:0.85rem;">
      Auth is not required by the server. Click continue.
    </p>
    <div style="margin-bottom:16px;">
      <input type="password" id="token-input" placeholder="dashboard token" autocomplete="off">
    </div>
    <p class="error-text" id="error-msg" style="display:none; margin-bottom:12px;"></p>
    <button class="primary" id="submit-btn" style="width:100%; padding:10px 24px;">continue</button>
  </div>
</div>

<script>
(async function () {
  const hint = document.getElementById('hint');
  const hintPublic = document.getElementById('hint-public');
  const tokenInput = document.getElementById('token-input');
  const errorMsg = document.getElementById('error-msg');
  const submitBtn = document.getElementById('submit-btn');

  let authRequired = false;
  try {
    const res = await fetch('/api/dashboard/config');
    if (res.ok) {
      const cfg = await res.json();
      authRequired = cfg.auth_required;
    }
  } catch (e) {}

  if (authRequired) {
    hint.style.display = '';
    tokenInput.focus();
  } else {
    hintPublic.style.display = '';
    tokenInput.style.display = 'none';
  }

  async function tryLogin() {
    errorMsg.style.display = 'none';
    if (!authRequired) {
      window.location.href = '/dashboard/index.html';
      return;
    }
    const token = tokenInput.value.trim();
    if (!token) {
      errorMsg.textContent = 'please enter a token';
      errorMsg.style.display = '';
      return;
    }
    const res = await fetch('/api/dashboard/snapshot', {
      headers: { 'X-Dashboard-Token': token },
    });
    if (res.ok) {
      const secure = location.protocol === 'https:' ? '; Secure' : '';
      document.cookie =
        `sembr_dashboard_token=${encodeURIComponent(token)}; path=/dashboard; SameSite=Strict${secure}`;
      try { localStorage.setItem('sembr_dashboard_token', token); } catch (e) {}
      window.location.href = '/dashboard/index.html';
    } else {
      errorMsg.textContent =
        res.status === 401 ? 'invalid token' : `server returned ${res.status}`;
      errorMsg.style.display = '';
    }
  }

  submitBtn.addEventListener('click', tryLogin);
  tokenInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') tryLogin();
  });
})();
</script>
</body>
</html>
