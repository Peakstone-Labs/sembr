site_name: sembr
site_description: Intent-driven news monitoring via Reverse RAG
site_url: https://peakstone-labs.github.io/sembr
repo_url: https://github.com/Peakstone-Labs/sembr
repo_name: Peakstone-Labs/sembr
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.action.edit

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Configuration: configuration.md
  - Architecture: architecture.md
  - Modules:
    - Overview: modules/index.md
    - db: modules/db.md
    - db schema: modules/db-schema.md
    - embedder: modules/embedder.md
    - vector_store: modules/vector-store.md
    - collector: modules/collector.md
    - matcher: modules/matcher.md
    - summarizer: modules/summarizer.md
    - notifier: modules/notifier.md
    - logbus: modules/logbus.md
    - api: modules/api.md
    - dashboard: modules/dashboard.md
  - Contributing: contributing.md
  - 中文文档:
    - 简介: zh/index.md
    - 快速上手: zh/getting-started.md
    - 配置参考: zh/configuration.md
