services:
  api:
    build: .
    container_name: sembr-api
    depends_on:
      - qdrant
    ports:
      - "${SEMBR_HOST_PORT:-8000}:8000"
    env_file:
      - .env
    volumes:
      # NOTE: keep ./data on a local POSIX-ish FS (ext4 / APFS / NTFS local).
      # SQLite WAL fsync is unsafe on network shares.
      - ./data:/app/data
      - ./models:/app/models
    mem_limit: 3g
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: sembr-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    mem_limit: 4g
    mem_reservation: 2g
    restart: unless-stopped

volumes:
  qdrant_data:
