services:
  rsshub:
    image: diygod/rsshub:latest
    container_name: sembr-rsshub
    restart: unless-stopped
    ports:
      - "1200:1200"
    env_file:
      - .env
    mem_limit: 512m

  api:
    build: .
    container_name: sembr-api
    depends_on:
      - qdrant
      - rsshub
    ports:
      - "${SEMBR_HOST_PORT:-8000}:8000"
    env_file:
      - .env
    volumes:
      # NOTE: keep ./data on a local POSIX-ish FS (ext4 / APFS / NTFS local).
      # SQLite WAL fsync and Qdrant mmap (./data/qdrant) are both unsafe on network shares.
      - ./data:/app/data
      # Templates UI requires write access (POST/PUT/DELETE/rename via dashboard).
      # Container UID must own ./prompts on host; bundled image runs as root → OK by default.
      - ./prompts:/app/prompts
      # Settings editor: bind-mount the host .env so /api/settings/save can
      # rewrite it. `cp .env.example .env` BEFORE first `compose up`, otherwise
      # Docker creates a directory here and the API fails fast on startup.
      - ./.env:/app/.env
      # docker.sock: required by RestartController to drive RSSHub restarts.
      # SECURITY: this grants the API container docker-root on the host.
      # See README "Production deployment" for trade-offs.
      - /var/run/docker.sock:/var/run/docker.sock
      # RestartController needs the compose file to drive `docker compose up
      # --force-recreate rsshub` from inside the container.
      - ./docker-compose.yml:/app/docker-compose.yml:ro
    environment:
      # Without this, `docker compose` inside the container defaults to the
      # cwd-based project name "app" instead of "sembr", and would create a
      # parallel set of containers rather than targeting sembr-rsshub.
      - COMPOSE_PROJECT_NAME=sembr
    mem_limit: 3g
    mem_reservation: 1g
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: sembr-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage
    mem_limit: 4g
    mem_reservation: 2g
    restart: unless-stopped
